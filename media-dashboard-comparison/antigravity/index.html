<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Antigravity Media Dashboard</title>
    <style>
      :root { --bg:#f7f7f4; --ink:#151c1b; --muted:#65716e; --line:#dfe4dc; --panel:#fff; --accent:#7b4d6d; }
      * { box-sizing:border-box; }
      body { margin:0; font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--ink); }
      header { padding:clamp(28px,5vw,70px); background:linear-gradient(120deg, rgba(123,77,109,.14), transparent 48%), #eef1ed; border-bottom:1px solid var(--line); }
      h1 { max-width:860px; margin:0; font-size:clamp(42px,7vw,76px); line-height:1; letter-spacing:0; }
      p { max-width:760px; color:var(--muted); font-size:18px; line-height:1.55; }
      main { padding:clamp(20px,4vw,48px); display:grid; gap:16px; }
      .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; }
      .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:20px; box-shadow:0 18px 50px rgba(21,28,27,.08); }
      .value { display:block; margin-top:8px; font-size:34px; font-weight:900; }
      a { color:var(--accent); font-weight:800; }
      pre { white-space:pre-wrap; overflow:auto; }
    </style>
  </head>
  <body>
    <header>
      <h1>Antigravity media exposure comparison</h1>
      <p>This comparison target is deployed with the same GitHub Actions artifact and exposes generated JSON endpoints for side-by-side validation.</p>
    </header>
    <main>
      <section class="grid">
        <article class="card"><span>Record count</span><strong id="recordCount" class="value">Loading</strong></article>
        <article class="card"><span>Last updated</span><strong id="lastUpdated" class="value">Loading</strong></article>
        <article class="card"><span>Sources used</span><strong id="sourcesUsed" class="value">Loading</strong></article>
      </section>
      <section class="card">
        <h2>Generated files</h2>
        <p><a href="./data/generated/metadata.json">metadata.json</a> <a href="./data/generated/mentions.json">mentions.json</a></p>
        <pre id="warnings"></pre>
      </section>
    </main>
    <script>
      fetch("./data/generated/metadata.json", { cache: "no-store" }).then(function (response) {
        if (!response.ok) throw new Error("metadata missing");
        return response.json();
      }).then(function (metadata) {
        document.getElementById("recordCount").textContent = metadata.recordCount || 0;
        document.getElementById("lastUpdated").textContent = metadata.lastUpdated || "n/a";
        document.getElementById("sourcesUsed").textContent = (metadata.sourcesUsed || []).join(", ") || "n/a";
        document.getElementById("warnings").textContent = JSON.stringify(metadata.warnings || [], null, 2);
      }).catch(function () {
        document.getElementById("recordCount").textContent = "Missing";
        document.getElementById("warnings").textContent = "Generated data files were not found on the deployed site.";
      });
    </script>
  </body>
</html>
